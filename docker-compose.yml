services:
  api:
    build: ./api
    ports:
      - "8080:8080"
    env_file:
      - ./api/.env
    environment:
      PORT: 8080
      ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: kuberlauncher
      DB_PASSWORD: kuberlauncher
      DB_NAME: kuberlauncher
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "argocd.localhost:host-gateway"
      - "grafana.localhost:host-gateway"
      - "vault.localhost:host-gateway"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kuberlauncher
      POSTGRES_PASSWORD: kuberlauncher
      POSTGRES_DB: kuberlauncher
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kuberlauncher"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@kuberlauncher.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
